services:
  # ---------- FastAPI Application ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edtech-app
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://edtech:edtech_secret@postgres:5432/edtech_db
      REDIS_URL: redis://redis:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app # hot-reload in dev
      - /app/.venv  # exclude local .venv from mount
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: edtech-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edtech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edtech_secret}
      POSTGRES_DB: ${POSTGRES_DB:-edtech_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edtech} -d ${POSTGRES_DB:-edtech_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: edtech-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Celery Worker ----------
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edtech-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://edtech:edtech_secret@postgres:5432/edtech_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
