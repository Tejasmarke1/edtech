# Jitsi Meet self-hosted setup with JWT authentication
# This enables our backend's JWT tokens to control room access.

services:
  # ---------- Jitsi Web (Nginx frontend) ----------
  jitsi-web:
    image: jitsi/web:stable-9823
    container_name: edtech-jitsi-web
    ports:
      - "8443:443"
      - "8080:80"
    environment:
      - ENABLE_AUTH=1
      - AUTH_TYPE=jwt
      - JWT_APP_ID=edtech-doubt-resolution
      - JWT_APP_SECRET=change-me-to-a-jitsi-secret-in-production
      - JWT_ACCEPTED_ISSUERS=edtech-doubt-resolution
      - JWT_ACCEPTED_AUDIENCES=edtech-doubt-resolution
      - XMPP_SERVER=jitsi-prosody
      - XMPP_BOSH_URL_BASE=http://jitsi-prosody:5280
      - JICOFO_AUTH_USER=focus
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - PUBLIC_URL=https://127.0.0.1:8443
      - TZ=Asia/Kolkata
      - ENABLE_XMPP_WEBSOCKET=1
      - ENABLE_COLIBRI_WEBSOCKET=1
      - JVB_COLIBRI_WS_URL=ws://jitsi-jvb:9090
    volumes:
      - jitsi-web-config:/config
      - jitsi-web-crontabs:/var/spool/cron/crontabs
      - jitsi-transcripts:/usr/share/jitsi-meet/transcripts
    depends_on:
      - jitsi-prosody
    restart: unless-stopped
    networks:
      jitsi-net:
        aliases:
          - meet.jitsi

  # ---------- Prosody (XMPP + JWT auth) ----------
  jitsi-prosody:
    image: jitsi/prosody:stable-9823
    container_name: edtech-jitsi-prosody
    environment:
      - ENABLE_AUTH=1
      - AUTH_TYPE=jwt
      - JWT_APP_ID=edtech-doubt-resolution
      - JWT_APP_SECRET=change-me-to-a-jitsi-secret-in-production
      - JWT_ACCEPTED_ISSUERS=edtech-doubt-resolution
      - JWT_ACCEPTED_AUDIENCES=edtech-doubt-resolution
      - JWT_ALLOW_EMPTY=0
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
      - XMPP_CROSS_DOMAIN=true
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=jicofo_pass_123
      - JICOFO_COMPONENT_SECRET=jicofo_component_123
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=jvb_pass_123
      - TZ=Asia/Kolkata
      - LOG_LEVEL=info
      - ENABLE_XMPP_WEBSOCKET=1
    volumes:
      - jitsi-prosody-config:/config
      - jitsi-prosody-plugins:/prosody-plugins-custom
    restart: unless-stopped
    networks:
      jitsi-net:
        aliases:
          - jitsi-prosody

  # ---------- Jicofo (Focus component) ----------
  jitsi-jicofo:
    image: jitsi/jicofo:stable-9823
    container_name: edtech-jitsi-jicofo
    environment:
      - XMPP_SERVER=jitsi-prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=jicofo_pass_123
      - JICOFO_COMPONENT_SECRET=jicofo_component_123
      - AUTH_TYPE=jwt
      - TZ=Asia/Kolkata
    volumes:
      - jitsi-jicofo-config:/config
    depends_on:
      - jitsi-prosody
    restart: unless-stopped
    networks:
      - jitsi-net

  # ---------- JVB (Video bridge) ----------
  jitsi-jvb:
    image: jitsi/jvb:stable-9823
    container_name: edtech-jitsi-jvb
    ports:
      - "10000:10000/udp"
      - "9090:9090"
    environment:
      - XMPP_SERVER=jitsi-prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=jvb_pass_123
      - JVB_PORT=10000
      - JVB_ADVERTISE_IPS=127.0.0.1
      - JVB_DISABLE_STUN=true
      - JVB_STUN_SERVERS=
      - COLIBRI_WEBSOCKET_ENABLED=true
      - ENABLE_COLIBRI_WEBSOCKET=1
      - JVB_WS_DOMAIN=127.0.0.1:8443
      - JVB_WS_SERVER_ID=jvb
      - TZ=Asia/Kolkata
    volumes:
      - jitsi-jvb-config:/config
    depends_on:
      - jitsi-prosody
    restart: unless-stopped
    networks:
      jitsi-net:
        aliases:
          - jvb

volumes:
  jitsi-web-config:
  jitsi-web-crontabs:
  jitsi-transcripts:
  jitsi-prosody-config:
  jitsi-prosody-plugins:
  jitsi-jicofo-config:
  jitsi-jvb-config:

networks:
  jitsi-net:
    driver: bridge
